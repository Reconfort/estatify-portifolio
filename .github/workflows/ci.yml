name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

# Cancel superseded runs on the same ref to save CI minutes.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  # Non-interactive, deterministic installs.
  CI: true
  NX_DAEMON: false

jobs:
  ci:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          # Full history so `nx affected` can diff against the base branch.
          fetch-depth: 0

      - name: Setup pnpm
        uses: pnpm/action-setup@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: pnpm

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      # Sets NX_BASE / NX_HEAD so `nx affected` only runs changed projects.
      - name: Derive affected SHAs
        uses: nrwl/nx-set-shas@v4

      - name: Prettier (format check)
        run: pnpm format:check

      - name: Lint
        run: pnpm exec nx affected -t lint --parallel=3

      - name: Typecheck
        run: pnpm exec nx affected -t typecheck --parallel=3

      - name: Test
        run: pnpm exec nx affected -t test --parallel=3

      - name: Build
        run: pnpm exec nx affected -t build --parallel=3
